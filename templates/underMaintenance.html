<!DOCTYPE html>
<html lang="en" class="h-full overflow-hidden">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maintenance</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="h-full overflow-hidden bg-white flex items-center justify-center">

    <div class="w-full h-full overflow-hidden flex items-center justify-center">
<div class="text-center">

    <!-- Logo -->
    <div class="mb-24 mr-8">
        <img src="/static/icon/logo-ventara.svg" 
            alt="Ventara Logo" 
            class="h-20 mx-auto">
    </div>

    <!-- Title -->
    <h2 class="text-5xl font-bold text-gray-700 mb-2">
        The Site is Currently <br> Down for Maintenance
    </h2>

    <!-- Subtitle -->
    <p class="text-gray-400 text-lg mb-24">
        We apologize for any inconveniences caused.<br>
        We've almost done.
    </p>

    <!-- PLUG SECTION -->
    <div class="flex items-center justify-center gap-6 mb-10">

        <!-- LEFT CABLE -->
        <div class="flex items-center">
            <div class="h-2 w-[40rem] bg-blue-400 rounded-l-full"></div>

            <!-- LEFT PLUG -->
            <div class="w-14 h-12 bg-blue-500 rounded-md flex items-center justify-center relative">
                <div class="w-1 h-6 bg-white absolute left-2"></div>
                <div class="w-1 h-6 bg-white absolute right-2"></div>
            </div>
        </div>

        <!-- BREAK -->
        <div class="w-4 h-4 bg-blue-300 rotate-45"></div>

        <!-- RIGHT PLUG -->
        <div class="flex items-center">
            <div class="w-14 h-12 bg-green-500 rounded-md flex items-center justify-center relative">
                <div class="w-1 h-6 bg-white absolute left-2"></div>
                <div class="w-1 h-6 bg-white absolute right-2"></div>
            </div>

            <!-- RIGHT CABLE -->
            <div class="h-2 w-[40rem] bg-green-400 rounded-r-full"></div>
        </div>

    </div>

    <!-- DIVIDER -->
    <div class="border-t border-gray-300 my-6 w-screen relative left-1/2 -translate-x-1/2"></div>

    <!-- FOOTER -->
    <div class="text-md text-gray-400 mb-6">
        You can contact us: support@ventara.id
    </div>

    <!-- BUTTON -->
    <a href="/" 
    class="inline-block px-6 py-2 bg-teal-500 text-white font-bold rounded-lg text-md hover:bg-teal-600 transition">
        Back to Home
    </a>

</div>
</div>

</body>
</html>
